<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:,">
  <title>Σενάριο 2 — Μελέτη AI Χρηματοοικονομικού Βοηθού</title>
  <link rel="stylesheet" href="../assets/style.css" />
  <style>
    /* Suggested questions */
    .suggested-questions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .suggested-question-btn {
      background: #eff6ff;
      border: 1.5px solid #93c5fd;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      color: #1d4ed8;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1.4;
    }

    .suggested-question-btn:hover {
      background: #dbeafe;
      border-color: #3b82f6;
    }

    .suggested-question-btn.selected {
      background: #dbeafe;
      border-color: #2563eb;
      font-weight: 600;
    }

    /* Section label above chat */
    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 0.4rem;
    }
  </style>
</head>
<body>
  <div class="progress-bar-wrapper">
    <div class="progress-bar" style="width: calc(4/6 * 100%);"></div>
  </div>
  <div class="progress-label">Βήμα 4 από 6</div>

  <div class="container" id="main-container">
    <!-- Content injected by JS -->
  </div>

  <script src="../assets/app.js" defer></script>
  <script src="../assets/supabase-client.js" defer></script>
  <script src="../assets/chat.js" defer></script>
  <script defer>
    const ROUNDS = [
      { roundNumber: 1, marketPerformance: { cash: 0.5, bonds: 1.0, balancedFund: 2.0, stocks: 4.0 }, recommendedAllocation: { cash: 10, bonds: 20, balancedFund: 40, stocks: 30 } },
      { roundNumber: 2, marketPerformance: { cash: 0.5, bonds: 0.5, balancedFund: -1.5, stocks: -6.0 }, recommendedAllocation: { cash: 20, bonds: 30, balancedFund: 40, stocks: 10 } },
      { roundNumber: 3, marketPerformance: { cash: 0.5, bonds: -1.0, balancedFund: 1.0, stocks: 5.0 }, recommendedAllocation: { cash: 25, bonds: 35, balancedFund: 35, stocks: 5 } },
      { roundNumber: 4, marketPerformance: { cash: 0.5, bonds: 0.8, balancedFund: 1.2, stocks: -4.0 }, recommendedAllocation: { cash: 15, bonds: 30, balancedFund: 40, stocks: 15 } },
    ];

    const ASSET_LABELS = { cash: 'Μετρητά', bonds: 'Ομόλογα', balancedFund: 'Μικτό Αμοιβαίο Κεφάλαιο', stocks: 'Μετοχικό ETF' };

    const ROUND_FOCAL = [
      { question: 'Το Μετοχικό ETF απέδωσε +4.0% αυτόν τον γύρο.', focalAssetKey: 'stocks' },
      { question: 'Το Μετοχικό ETF απέδωσε -6.0% αυτόν τον γύρο.', focalAssetKey: 'stocks' },
      { question: 'Τα Ομόλογα απέδωσαν -1.0% αυτόν τον γύρο.', focalAssetKey: 'bonds' },
      { question: 'Το Μετοχικό ETF απέδωσε -4.0% αυτόν τον γύρο.', focalAssetKey: 'stocks' },
    ];

    let currentRoundIndex = 0;
    let _roundStartTime = Date.now();

    function investmentDefinitionsTable() {
      return `
        <table>
          <thead><tr><th>Επιλογή</th><th>Επίπεδο Κινδύνου</th></tr></thead>
          <tbody>
            <tr><td>Λογαριασμός Μετρητών</td><td>Πολύ χαμηλός κίνδυνος</td></tr>
            <tr><td>Ομόλογα</td><td>Χαμηλός κίνδυνος</td></tr>
            <tr><td>Μικτό Αμοιβαίο Κεφάλαιο</td><td>Μέτριος κίνδυνος</td></tr>
            <tr><td>Μετοχικό ETF</td><td>Υψηλός κίνδυνος</td></tr>
          </tbody>
        </table>`;
    }

    function renderLikert(name, question, endLeft, endRight) {
      const opts = [1, 2, 3, 4, 5, 6, 7].map(function (n) {
        return '<label for="' + name + '-' + n + '"><input type="radio" id="' + name + '-' + n + '" name="' + name + '" value="' + n + '" /><span>' + n + '</span></label>';
      }).join('');
      return (
        '<div class="likert-group">' +
          '<span class="likert-label">' + question + '</span>' +
          '<div class="likert-options" id="' + name + '-options">' + opts + '</div>' +
          '<div class="likert-end-labels"><span>' + endLeft + '</span><span>' + endRight + '</span></div>' +
        '</div>'
      );
    }

    // ── State 1: Intro ──────────────────────────────────────────────────
    function renderIntro() {
      const container = document.getElementById('main-container');
      container.innerHTML =
        '<div class="card">' +
          '<h1>Οδηγίες</h1>' +
          '<h2>Σενάριο: Προσομοίωση Κατανομής Επένδυσης</h2>' +
          '<p>Θα διαχειριστείτε ένα χαρτοφυλάκιο €10.000 σε 4 γύρους. Σε κάθε γύρο θα βλέπετε την απόδοση της αγοράς και θα λαμβάνετε σύσταση από AI.</p>' +
          '<ul>' +
            '<li>Διαχειρίζεστε €10.000.</li>' +
            '<li>Σε κάθε γύρο θα δείτε τι έγινε στην αγορά.</li>' +
            '<li>Θα λάβετε σύσταση από AI.</li>' +
            '<li>Θα αποφασίσετε κατανομή 100% στις 4 επιλογές.</li>' +
            '<li>Στο τέλος κάθε γύρου θα απαντήσετε σε σύντομες ερωτήσεις.</li>' +
          '</ul>' +
        '</div>' +
        '<div class="card">' +
          '<h2>Περιγραφή Επενδυτικών Επιλογών</h2>' +
          investmentDefinitionsTable() +
        '</div>' +
        '<button id="start-btn" class="btn btn-primary btn-full">Έναρξη Γύρου 1</button>';

      document.getElementById('start-btn').addEventListener('click', function () {
        renderRound();
      });

      // Log scenario entry
      try {
        const pid = window.AppUtils.getParticipantId();
        const cond = window.AppUtils.getCondition();
        window.SupabaseUtils.insertStudyEvent(pid, 'scenario2', 'scenario_enter', cond, null);
      } catch (_e) { /* silent */ }
    }

    // ── State 2: Round ──────────────────────────────────────────────────
    function renderRound() {
      _roundStartTime = Date.now();

      // Log round start
      try {
        const pid = window.AppUtils.getParticipantId();
        const cond = window.AppUtils.getCondition();
        window.SupabaseUtils.insertStudyEvent(pid, 'scenario2', 'round_started', cond, ROUNDS[currentRoundIndex].roundNumber);
      } catch (_e) { /* silent */ }

      const round = ROUNDS[currentRoundIndex];
      const focal = ROUND_FOCAL[currentRoundIndex];
      const container = document.getElementById('main-container');
      const rec = round.recommendedAllocation;
      const mp = round.marketPerformance;
      const isLastRound = currentRoundIndex === ROUNDS.length - 1;
      const nextRoundLabel = isLastRound
        ? 'Ολοκλήρωση Γύρου 4 →'
        : 'Συνέχεια στον Γύρο ' + (round.roundNumber + 1) + ' →';

      // Block 2: shown from round 2 onwards as collapsible accordion
      const assetDefinitionsBlock = currentRoundIndex === 0 ? '' :
        '<div class="card">' +
          '<details>' +
            '<summary>Δείτε ξανά τις περιγραφές επενδύσεων</summary>' +
            investmentDefinitionsTable() +
          '</details>' +
        '</div>';

      // SECTION 1: market performance rows
      const marketRows = Object.entries(mp).map(function (entry) {
        const k = entry[0], v = entry[1];
        return '<tr><td>' + ASSET_LABELS[k] + '</td><td style="color:' + (v >= 0 ? '#065f46' : '#b91c1c') + '">' + (v >= 0 ? '+' : '') + v + '%</td></tr>';
      }).join('');

      // SECTION 2: AI recommendation text (reframed as risk management suggestion)
      const recText = 'Για διαχείριση κινδύνου τον επόμενο γύρο, μια συνετή κατανομή θα ήταν: Μετρητά ' + rec.cash + '%, Ομόλογα ' + rec.bonds + '%, Μικτό Αμοιβαίο Κεφάλαιο ' + rec.balancedFund + '%, Μετοχικό ETF ' + rec.stocks + '%.';

      // Disposition question text (dynamically generated from focal asset data)
      const focalAssetReturn = mp[focal.focalAssetKey];
      const focalAssetLabel = ASSET_LABELS[focal.focalAssetKey];
      const focalReturnStr = (focalAssetReturn >= 0 ? '+' : '') + focalAssetReturn + '%';

      container.innerHTML =
        // Block 1: Round header
        '<div class="card">' +
          '<h1>Γύρος ' + round.roundNumber + ' από 4</h1>' +
          '<p>Ο στόχος σας είναι να μεγιστοποιήσετε την αξία του χαρτοφυλακίου με βάση τις πληροφορίες που βλέπετε.</p>' +
        '</div>' +

        // Block 2: Asset definitions accordion (rounds 2+)
        assetDefinitionsBlock +

        // SECTION 1: Market Performance
        '<div class="card">' +
          '<h2>Απόδοση αγοράς στον προηγούμενο γύρο</h2>' +
          '<table>' +
            '<thead><tr><th>Επιλογή</th><th>Απόδοση</th></tr></thead>' +
            '<tbody>' + marketRows + '</tbody>' +
          '</table>' +
          '<p style="margin-top:0.75rem;font-style:italic;font-size:0.9rem;color:#6b7280;">Οι αποδόσεις της αγοράς δεν μπορούν να προβλεφθούν με βεβαιότητα.</p>' +
        '</div>' +

        // SECTION 2: AI Recommendation
        '<div class="card">' +
          '<h2>Σύσταση του ψηφιακού βοηθού για τον επόμενο γύρο</h2>' +
          '<div class="chat-bubble assistant">' + recText + '</div>' +
          '<p style="margin-top:0.5rem;font-style:italic;font-size:0.9rem;color:#6b7280;">Σημείωση: Μπορείτε να ακολουθήσετε ή να αγνοήσετε τη σύσταση.</p>' +
          '<div id="chat-container" class="chat-widget" style="margin-top:0.75rem;"></div>' +
          '<div style="margin-top:0.75rem;">' +
            '<button id="skip-btn" class="btn btn-secondary">Παράλειψη →</button>' +
          '</div>' +
        '</div>' +

        // SECTION 3: Allocation Input
        '<div class="card" id="allocation-section">' +
          '<h2>Η δική σας κατανομή (€10.000)</h2>' +
          '<p>Κατανείμετε το χαρτοφυλάκιό σας. Το σύνολο πρέπει να είναι 100%.</p>' +
          '<div style="margin-bottom:0.75rem;display:flex;gap:0.5rem;flex-wrap:wrap;">' +
            '<button id="fill-equal-btn" class="btn btn-secondary">Συμπλήρωση ισόποσα (25%)</button>' +
            '<button id="fill-ai-btn" class="btn btn-secondary">Χρήση πρότασης AI</button>' +
          '</div>' +
          '<div class="allocation-row">' +
            '<label for="alloc-cash">Μετρητά %</label>' +
            '<input type="number" id="alloc-cash" min="0" max="100" value="" />' +
          '</div>' +
          '<div class="allocation-row">' +
            '<label for="alloc-bonds">Ομόλογα %</label>' +
            '<input type="number" id="alloc-bonds" min="0" max="100" value="" />' +
          '</div>' +
          '<div class="allocation-row">' +
            '<label for="alloc-balanced">Μικτό Αμοιβαίο Κεφάλαιο %</label>' +
            '<input type="number" id="alloc-balanced" min="0" max="100" value="" />' +
          '</div>' +
          '<div class="allocation-row">' +
            '<label for="alloc-stocks">Μετοχικό ETF %</label>' +
            '<input type="number" id="alloc-stocks" min="0" max="100" value="" />' +
          '</div>' +
          '<div class="allocation-sum sum-bad" id="alloc-sum">Σύνολο: 0% (πρέπει να είναι 100%)</div>' +
          '<p class="alloc-hint">Το σύνολο των ποσοστών πρέπει να ισούται με 100%.</p>' +
        '</div>' +

        // Portfolio Feedback (hidden until sum = 100%)
        '<div class="card" id="portfolio-feedback-section" style="display:none;">' +
          '<h2>Εκτιμώμενη επίδραση στο χαρτοφυλάκιό σας</h2>' +
          '<p>Με βάση την κατανομή που επιλέξατε και τις αποδόσεις της αγοράς σε αυτόν τον γύρο, η εκτιμώμενη μεταβολή του χαρτοφυλακίου σας είναι:</p>' +
          '<div id="portfolio-return-display" style="font-size:1.5rem;font-weight:700;margin:0.75rem 0;text-align:center;"></div>' +
          '<p id="portfolio-value-display" style="text-align:center;font-size:1rem;margin:0;"></p>' +
        '</div>' +

        // Sell/hold decision (after portfolio feedback, conditionally shown)
        '<div class="card" id="disposition-section" style="display:none;">' +
          '<h2>Απόφαση για τον επόμενο γύρο</h2>' +
          '<p>Στον γύρο αυτό, το ' + focalAssetLabel + ' είχε απόδοση ' + focalReturnStr + '. Αν είχατε επένδυση σε αυτό το στοιχείο, τι θα κάνατε για τον επόμενο γύρο;</p>' +
          '<div class="decision-options" id="disposition-options" style="margin-top:0.75rem;margin-bottom:1.25rem;">' +
            '<label for="disp-sell"><input type="radio" id="disp-sell" name="disposition" value="sell" /><span>Θα πουλούσα τη θέση (μεταφορά στα Μετρητά)</span></label>' +
            '<label for="disp-hold"><input type="radio" id="disp-hold" name="disposition" value="hold" /><span>Θα κρατούσα τη θέση</span></label>' +
          '</div>' +
        '</div>' +

        // Likert measures (hidden until allocation === 100%)
        '<div class="card" id="round-measures-section" style="display:none;">' +
          renderLikert('confidence', 'Πόσο σίγουρος/η νιώθετε για αυτή την κατανομή;', '1 = Καθόλου σίγουρος/η', '7 = Πολύ σίγουρος/η') +
          renderLikert('trust_round', 'Εμπιστεύομαι τη σύσταση του AI σε αυτόν τον γύρο.', '1 = Διαφωνώ απόλυτα', '7 = Συμφωνώ απόλυτα') +
          renderLikert('control', 'Νιώθω ότι έχω τον έλεγχο των επενδυτικών αποφάσεών μου αυτή τη στιγμή.', '1 = Διαφωνώ απόλυτα', '7 = Συμφωνώ απόλυτα') +
          renderLikert('compliance', 'Ακολούθησα στενά τη σύσταση του AI σε αυτόν τον γύρο.', '1 = Διαφωνώ απόλυτα', '7 = Συμφωνώ απόλυτα') +
          '<button id="round-next-btn" class="btn btn-primary btn-full" style="margin-top:0.5rem;" disabled>' +
            nextRoundLabel +
          '</button>' +
        '</div>';

      // Wire up chat
      window.ChatUtils.initChat('chat-container', 'scenario2', round.roundNumber, [
        'Γιατί προτείνεται αυτή η κατανομή;',
        'Ποια επιλογή έχει τον μεγαλύτερο κίνδυνο;',
        'Ποια επιλογή έχει την μεγαλύτερη πιθανή απόδοση;',
        'Ποια επιλογή θεωρείται πιο σταθερή;'
      ]);

      // Allocation inputs
      const allocInputs = ['alloc-cash', 'alloc-bonds', 'alloc-balanced', 'alloc-stocks'];
      const focalInputMap = { cash: 'alloc-cash', bonds: 'alloc-bonds', balancedFund: 'alloc-balanced', stocks: 'alloc-stocks' };

      function getSum() {
        return allocInputs.reduce(function (sum, id) {
          return sum + (parseInt(document.getElementById(id).value) || 0);
        }, 0);
      }

      function getFocalAlloc() {
        return parseInt(document.getElementById(focalInputMap[focal.focalAssetKey]).value) || 0;
      }

      function updatePortfolioFeedback() {
        const cashVal = parseInt(document.getElementById('alloc-cash').value) || 0;
        const bondsVal = parseInt(document.getElementById('alloc-bonds').value) || 0;
        const balancedVal = parseInt(document.getElementById('alloc-balanced').value) || 0;
        const stocksVal = parseInt(document.getElementById('alloc-stocks').value) || 0;
        const portfolioReturn =
          (cashVal / 100) * mp.cash +
          (bondsVal / 100) * mp.bonds +
          (balancedVal / 100) * mp.balancedFund +
          (stocksVal / 100) * mp.stocks;
        const returnStr = (portfolioReturn >= 0 ? '+' : '') + portfolioReturn.toFixed(2) + '%';
        const portfolioValue = 10000 * (1 + portfolioReturn / 100);
        const valueStr = '€' + portfolioValue.toLocaleString('el-GR', { maximumFractionDigits: 0 });
        document.getElementById('portfolio-return-display').textContent = returnStr;
        document.getElementById('portfolio-value-display').textContent = 'Εκτιμώμενη αξία χαρτοφυλακίου: ' + valueStr;
      }

      function showFeedbackSections() {
        updatePortfolioFeedback();
        document.getElementById('portfolio-feedback-section').style.display = 'block';
        const focalAlloc = getFocalAlloc();
        document.getElementById('disposition-section').style.display = focalAlloc > 0 ? 'block' : 'none';
        document.getElementById('round-measures-section').style.display = 'block';
        updateContinueBtn();
      }

      function hideFeedbackSections() {
        document.getElementById('portfolio-feedback-section').style.display = 'none';
        document.getElementById('disposition-section').style.display = 'none';
        document.getElementById('round-measures-section').style.display = 'none';
      }

      // Skip and chatMessageSent unlock feedback sections if allocation already 100%
      function onChatInteraction() {
        if (getSum() === 100) {
          showFeedbackSections();
        }
      }
      document.addEventListener('chatMessageSent', onChatInteraction, { once: true });
      document.getElementById('skip-btn').addEventListener('click', onChatInteraction);

      function updateSum() {
        const total = getSum();
        const el = document.getElementById('alloc-sum');
        el.textContent = 'Σύνολο: ' + total + '%' + (total === 100 ? ' ✓' : ' (πρέπει να είναι 100%)');
        el.className = 'allocation-sum ' + (total === 100 ? 'sum-ok' : 'sum-bad');
        if (total === 100) {
          showFeedbackSections();
        } else {
          hideFeedbackSections();
        }
        updateContinueBtn();
      }

      function updateContinueBtn() {
        const btn = document.getElementById('round-next-btn');
        if (!btn) return;
        const needsDisposition = getFocalAlloc() > 0;
        const dispositionOk = !needsDisposition || document.querySelector('input[name="disposition"]:checked') !== null;
        const allFilled =
          getSum() === 100 &&
          dispositionOk &&
          document.querySelector('input[name="confidence"]:checked') &&
          document.querySelector('input[name="trust_round"]:checked') &&
          document.querySelector('input[name="control"]:checked') &&
          document.querySelector('input[name="compliance"]:checked');
        btn.disabled = !allFilled;
      }

      allocInputs.forEach(function (id) {
        document.getElementById(id).addEventListener('input', updateSum);
      });

      // Fill equally button
      document.getElementById('fill-equal-btn').addEventListener('click', function () {
        allocInputs.forEach(function (id) {
          document.getElementById(id).value = 25;
        });
        updateSum();
      });

      // "Use AI Proposal" button — fills inputs with the current round's AI recommendation
      document.getElementById('fill-ai-btn').addEventListener('click', function () {
        document.getElementById('alloc-cash').value     = rec.cash;
        document.getElementById('alloc-bonds').value    = rec.bonds;
        document.getElementById('alloc-balanced').value = rec.balancedFund;
        document.getElementById('alloc-stocks').value   = rec.stocks;
        updateSum();
      });

      // Measures radio change listeners
      ['disposition-options', 'confidence-options', 'trust_round-options', 'control-options', 'compliance-options'].forEach(function (optId) {
        const el = document.getElementById(optId);
        if (el) el.addEventListener('change', updateContinueBtn);
      });

      // Continue button
      document.getElementById('round-next-btn').addEventListener('click', async function () {
        this.disabled = true;
        this.textContent = 'Αποθήκευση…';

        // Disable inputs
        allocInputs.forEach(function (id) {
          document.getElementById(id).disabled = true;
        });

        const pid = window.AppUtils.getParticipantId();
        const allocation = {
          cash: parseInt(document.getElementById('alloc-cash').value) || 0,
          bonds: parseInt(document.getElementById('alloc-bonds').value) || 0,
          balancedFund: parseInt(document.getElementById('alloc-balanced').value) || 0,
          stocks: parseInt(document.getElementById('alloc-stocks').value) || 0,
        };
        const confidenceEl = document.querySelector('input[name="confidence"]:checked');
        const trustRoundEl = document.querySelector('input[name="trust_round"]:checked');
        const controlEl = document.querySelector('input[name="control"]:checked');
        const complianceEl = document.querySelector('input[name="compliance"]:checked');

        if (!confidenceEl || !trustRoundEl || !controlEl || !complianceEl) return;

        const confidence = parseInt(confidenceEl.value);
        const trustRound = parseInt(trustRoundEl.value);
        const control = parseInt(controlEl.value);
        const compliance = parseInt(complianceEl.value);
        const focalAlloc = getFocalAlloc();
        const dispositionEl = document.querySelector('input[name="disposition"]:checked');
        const disposition = focalAlloc > 0 ? (dispositionEl ? dispositionEl.value : null) : 'skipped';

        if (focalAlloc > 0 && !dispositionEl) return;

        await window.SupabaseUtils.insertScenario2Round(
          pid,
          round.roundNumber,
          allocation,
          confidence,
          trustRound,
          control,
          compliance,
          disposition,
          round.recommendedAllocation,
          window.ChatUtils.getChatQueryCount(),
          window.ChatUtils.getMessageCount(),
          window.ChatUtils.getTimeSpentInChatMs()
        );

        // Log round completion for stimulus delivery verification
        try {
          const cond = window.AppUtils.getCondition();
          await window.SupabaseUtils.insertStudyEvent(pid, 'scenario2', 'round_completed', cond, round.roundNumber);
        } catch (_e) { /* silent */ }

        // Silent behavioral log — invisible to participants
        try {
          const rec = round.recommendedAllocation;
          const cash_alloc     = allocation.cash;
          const bonds_alloc    = allocation.bonds;
          const balanced_alloc = allocation.balancedFund;
          const stocks_alloc   = allocation.stocks;
          const total_check    = cash_alloc + bonds_alloc + balanced_alloc + stocks_alloc;

          const deviation =
            Math.abs(cash_alloc     - rec.cash)         +
            Math.abs(bonds_alloc    - rec.bonds)        +
            Math.abs(balanced_alloc - rec.balancedFund) +
            Math.abs(stocks_alloc   - rec.stocks);

          let overrideLevel;
          if      (deviation === 0)  overrideLevel = 'none';
          else if (deviation <= 10)  overrideLevel = 'minor';
          else if (deviation <= 25)  overrideLevel = 'moderate';
          else                       overrideLevel = 'major';

          // Follow score: 100 minus 0.5 points per unit of deviation, clamped to [0, 100]
          const followScore = Math.max(0, Math.min(100, 100 - deviation / 2));

          const recommendationAccepted =
            Math.abs(cash_alloc     - rec.cash)         <= 5 &&
            Math.abs(bonds_alloc    - rec.bonds)        <= 5 &&
            Math.abs(balanced_alloc - rec.balancedFund) <= 5 &&
            Math.abs(stocks_alloc   - rec.stocks)       <= 5;

          const chatQueryCount  = window.ChatUtils.getChatQueryCount();
          const totalMessages   = window.ChatUtils.getMessageCount();
          const timeSpentInChat = window.ChatUtils.getTimeSpentInChatMs();
          const informationSeeking = chatQueryCount > 1;
          const decisionTimeMs = Date.now() - _roundStartTime;

          await window.SupabaseUtils.insertDecisionEvent({
            participant_id:               pid,
            scenario_id:                  'scenario2',
            round_number:                 round.roundNumber,
            ai_recommendation:            rec,
            user_decision:                allocation,
            recommendation_accepted:      recommendationAccepted,
            allocation_cash:              cash_alloc,
            allocation_bonds:             bonds_alloc,
            allocation_balanced:          balanced_alloc,
            allocation_stocks:            stocks_alloc,
            total_allocation_check:       total_check,
            allocation_deviation:         deviation,
            recommendation_override_level: overrideLevel,
            recommendation_follow_score:  parseFloat(followScore.toFixed(2)),
            chat_query_count:             chatQueryCount,
            total_messages:               totalMessages,
            time_spent_in_chat_ms:        timeSpentInChat,
            information_seeking:          informationSeeking,
            decision_time_ms:             decisionTimeMs,
          });
        } catch (_e) { /* silent — never block navigation */ }

        currentRoundIndex++;
        if (currentRoundIndex < ROUNDS.length) {
          renderRound();
        } else {
          renderPostScenario();
        }
      });
    }

    // ── State 3: Post-Scenario ──────────────────────────────────────────
    function renderPostScenario() {
      const container = document.getElementById('main-container');
      container.innerHTML =
        '<div class="card">' +
          '<h1>Ολοκλήρωση Σεναρίου 2</h1>' +
          renderLikert('influence', 'Σε ποιο βαθμό επηρέασαν οι συμβουλές του ψηφιακού βοηθού τις αποφάσεις σας;', '1 = Καθόλου', '7 = Πάρα πολύ') +
          renderLikert('trust_scenario2', 'Σε ποιο βαθμό εμπιστεύεστε τις συμβουλές που παρείχε ο ψηφιακός βοηθός;', '1 = Καθόλου', '7 = Πάρα πολύ') +
          renderLikert('manipulation_check', 'Ο ψηφιακός βοηθός φάνηκε να επικοινωνεί με ανθρώπινο τρόπο.', '1 = Διαφωνώ απόλυτα', '7 = Συμφωνώ απόλυτα') +
          '<button id="post-next-btn" class="btn btn-primary btn-full" style="margin-top:0.5rem;" disabled>Συνέχεια</button>' +
        '</div>';

      function updatePostBtn() {
        const btn = document.getElementById('post-next-btn');
        btn.disabled = !(
          document.querySelector('input[name="influence"]:checked') &&
          document.querySelector('input[name="trust_scenario2"]:checked') &&
          document.querySelector('input[name="manipulation_check"]:checked')
        );
      }

      ['influence-options', 'trust_scenario2-options', 'manipulation_check-options'].forEach(function (optId) {
        const el = document.getElementById(optId);
        if (el) el.addEventListener('change', updatePostBtn);
      });

      document.getElementById('post-next-btn').addEventListener('click', async function () {
        this.disabled = true;
        this.textContent = 'Αποθήκευση…';

        const pid = window.AppUtils.getParticipantId();
        const influenceEl = document.querySelector('input[name="influence"]:checked');
        const trustEl = document.querySelector('input[name="trust_scenario2"]:checked');
        const manipEl = document.querySelector('input[name="manipulation_check"]:checked');

        if (!influenceEl || !trustEl || !manipEl) return;

        const influence = parseInt(influenceEl.value);
        const trust_scenario2 = parseInt(trustEl.value);
        const manipulation_check = parseInt(manipEl.value);

        await window.SupabaseUtils.insertScenario2PostMeasures(pid, { influence, trust_scenario2, manipulation_check });

        // Log scenario completion for stimulus delivery verification
        try {
          const cond = window.AppUtils.getCondition();
          await window.SupabaseUtils.insertStudyEvent(pid, 'scenario2', 'scenario_completed', cond, null);
        } catch (_e) { /* silent */ }

        // STEP 4 — Navigate to the next scenario or to the post-survey if this was the last
        const nextScenario = window.AppUtils.getNextScenario('scenario2');
        if (nextScenario) {
          window.AppUtils.goTo(nextScenario);
        } else {
          window.AppUtils.goTo('postsurvey');
        }
      });
    }

    window.addEventListener('DOMContentLoaded', function () {
      renderIntro();
    });
  </script>
</body>
</html>
