<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Financial Assistant Study</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="spinner-wrapper">
    <div class="spinner"></div>
    <p>Loading study…</p>
  </div>

  <script src="assets/app.js" defer></script>
  <script src="assets/supabase-client.js" defer></script>
  <script defer>
    window.addEventListener('DOMContentLoaded', async function () {
      // Run all three randomisation steps (Steps 1–3).
      // initExperiment() is idempotent: existing sessionStorage values are
      // preserved on page reload so the same participant keeps the same
      // assignment throughout the session.
      const { participantId, experimentCondition, scenarioOrder } =
        window.AppUtils.initExperiment();

      // Register participant with Supabase only once per browser session
      if (!sessionStorage.getItem('exp_registered')) {
        await window.SupabaseUtils.insertParticipant(
          participantId,
          experimentCondition,
          scenarioOrder
        );
        sessionStorage.setItem('exp_registered', 'true');
      }

      // Redirect to intro
      window.location.href = 'pages/intro.html';
    });
  </script>
</body>
</html>
